services:
  registry:
    image: ghcr.io/project-zot/zot-linux-amd64:v2.1.5
    # Runs as uid/gid 1000 so it can write the bind-mounted storage on /mnt/1tbhdd (owned by rudi)
    user: "1000:1000"
    volumes:
      - /mnt/1tbhdd/registry/data:/var/lib/zot
      - ./config.json:/etc/zot/config.json:ro
      - ./auth/htpasswd:/etc/zot/htpasswd:ro
    networks:
      - traefik_net
    # No healthcheck: the zot image is distroless (no shell/wget), same as Portainer. See CLAUDE.md.
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.http.routers.registry.rule=Host(`registry.cruor.rudsvar.xyz`)
        - traefik.http.routers.registry.entrypoints=websecure
        - traefik.http.routers.registry.tls.certresolver=letsencrypt
        - traefik.http.services.registry.loadbalancer.server.port=5000

networks:
  traefik_net:
    external: true
    name: traefik_traefik_net
